<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Journal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="journal">

    <aside class="cover">

        <h1>Practice<br>Journal</h1>

        <nav>

            <button class="active">Dashboard</button>
            <button>Chapters</button>
            <button>Study Log</button>
            <button>Statistics</button>
            <button>Settings</button>

        </nav>

        <div class="quote">

            <p>"Pattern first,<br>code second."</p>

        </div>

    </aside>

    <div class="spiral"></div>

    <main class="pages">

        <section class="hero">

            <div class="progress-card">

                <div class="progress-circle">
                    0%
                </div>

            </div>

            <div class="welcome">

                <h2>Welcome back.</h2>

                <p>
                    Every problem you solve is another page written in your journal.
                </p>

            </div>

        </section>

        <section class="grid">

            <div class="card">

                <h3>Chapters</h3>

            </div>

            <div class="card">

                <h3>Due for Revisit</h3>

            </div>

            <div class="card">

                <h3>Study Log</h3>

            </div>

            <div class="card">

                <h3>Today's Stats</h3>

            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
